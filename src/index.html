<!doctype html>
<html lang="es-PE">
  <head>
    <meta charset="utf-8" />
    <title>Reportes Ciudadanos - Distrito de Echarati</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sistema de reportes ciudadanos del distrito de Echarati. Reporta incidentes de infraestructura, seguridad, medio ambiente y transporte en tu comunidad."
    />
    <meta name="theme-color" content="#00695C" />
    <link rel="icon" type="image/x-icon" href="assets/logos/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <app-root></app-root>
    <script>
      // Deshabilitar clic derecho
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault();
      });
      // Deshabilitar atajos de teclado para ver código fuente
      document.addEventListener('keydown', function (e) {
        // F12
        if (e.key === 'F12') {
          e.preventDefault();
        }
        // Ctrl+Shift+I (DevTools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
          e.preventDefault();
        }
        // Ctrl+Shift+J (Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
          e.preventDefault();
        }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
        }
        // Ctrl+Shift+C (Inspect element)
        if (e.ctrlKey && e.shiftKey && e.key === 'C') {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
